name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "chore/**"
    paths:
      - "front/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "front/**"
      - ".github/workflows/ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: front
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma Client を生成しないと @prisma/client が型を export せず typecheck が落ちる。
      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit Test
        run: pnpm run test

      - name: Start test database
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Integration Test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ymc_test?schema=public
        run: pnpm run test:it

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: E2E
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          # 公開フローは実テスト DB（IT で起動済み）を読む。auth はモックのまま。
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ymc_test?schema=public
        run: pnpm run test:e2e
